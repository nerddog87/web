<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
	<title>youhavenohe.art</title>
	<style>
@font-face {
  font-family: 'Smallest Pixel-7';
  src: url('smallest_pixel-7.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

/* Background video */
.bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1}

/* Basic reset */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
:root{--content-width:600px}
body{font-family:"Smallest Pixel-7", monospace;background:#1a1a1a;color:#ccc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding-top:calc(env(safe-area-inset-top, 0) + 10px)}

.wrap{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 16px;gap:10px}

.main-area{width:min(var(--content-width),96%);display:flex;gap:10px;align-items:stretch}

.card{width:100%;background:rgba(42,42,42,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);padding:20px;display:flex;gap:20px;align-items:stretch;box-shadow:0 4px 30px rgba(0,0,0,0.3);border-radius:12px}

.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:16px;justify-content:center;flex:1}
.avatar{width:100px;height:100px;border:2px solid #444;object-fit:cover;background:#333;border-radius:8px}
.name{font-size:1.5rem;margin-top:15px;font-weight:bold;color:#fff;text-transform:uppercase;letter-spacing:2px}
.tagline{margin-top:10px;color:#999;max-width:100%;font-style:italic;cursor:pointer;transition:all 0.2s ease}
.tagline:hover{color:#fff;transform:scale(1.05)}

.player-visualizer-column{width:100%;display:flex;flex-direction:column;gap:10px}

.discord-card{width:100%;display:flex;justify-content:center}
.discord-content{width:100%;display:flex;flex-direction:column;gap:8px;padding:20px;background:rgba(42,42,42,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 30px rgba(0,0,0,0.3);min-height:auto;border-radius:12px}

.discord-status{display:flex;align-items:center;gap:15px;padding:0;background:transparent;border:none;border-radius:0}
.discord-avatar{width:64px;height:64px;border-radius:12px;border:2px solid #444;object-fit:cover;image-rendering:crisp-edges;image-rendering:pixelated}
.status-info{display:flex;flex-direction:column;gap:5px;flex:1}
.discord-name{font-size:1rem;color:#fff;font-weight:bold;text-transform:uppercase;letter-spacing:1px}
.discord-status-text{font-size:0.8rem;color:#999;font-style:italic}
.discord-status.online .discord-status-text{color:#0f0}
.discord-status.idle .discord-status-text{color:#ff0}
.discord-status.dnd .discord-status-text{color:#f00}
.discord-status.offline .discord-status-text{color:#666}
.copy-discord-id{background:#333;border:2px solid #555;color:#ccc;font-family:"Smallest Pixel-7", monospace;font-size:0.7rem;font-weight:bold;padding:6px 10px;cursor:pointer;transition:all 0.2s ease;text-transform:uppercase;letter-spacing:1px;border-radius:8px;white-space:nowrap}
.copy-discord-id:hover{background:#444;border-color:#666;color:#fff;transform:scale(1.05)}

.spotify-card{width:min(var(--content-width),96%);display:flex;justify-content:center;transition:opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;visibility:visible}
.spotify-card.hidden{opacity:0;transform:translateY(-10px);visibility:hidden;pointer-events:none}
.spotify-content{width:100%;display:flex;flex-direction:column;gap:8px;padding:40px;background:rgba(42,42,42,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 30px rgba(0,0,0,0.3);min-height:120px;border-radius:12px}
.spotify-status{display:flex;align-items:center;gap:15px;padding:0;background:transparent;border:none;border-radius:0}
.spotify-album-art{width:64px;height:64px;border-radius:8px;border:2px solid #444;object-fit:cover}
.spotify-info{display:flex;flex-direction:column;gap:3px;flex:1}
.spotify-song{font-size:0.9rem;color:#fff;font-weight:bold;text-transform:uppercase;letter-spacing:1px}
.spotify-artist{font-size:0.8rem;color:#999;font-style:italic}
.spotify-status.playing .spotify-song{color:#1db954}
.spotify-progress{margin-top:5px}
.spotify-progress-bar{width:100%;height:4px;background:#444;border-radius:4px;overflow:hidden;margin-bottom:3px}
.spotify-progress-bar::after{content:'';display:block;height:100%;background:#1db954;width:var(--progress, 0%);transition:width 0.3s ease}
.spotify-time{display:flex;justify-content:space-between;font-size:0.7rem;color:#666;font-family:"Smallest Pixel-7", monospace}

.player-card{width:100%;display:flex;justify-content:center}
#player{display:flex;flex-direction:column;justify-content:space-between;height:120px;padding:12px}
.player{width:100%;display:flex;flex-direction:column;gap:8px;padding:40px;background:rgba(42,42,42,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);justify-content:space-between;box-shadow:0 4px 30px rgba(0,0,0,0.3);min-height:120px;border-radius:12px}
.player .control{background:#333;border:2px solid #555;color:#ccc;font-family:"Smallest Pixel-7", monospace;font-size:12px;font-weight:bold;padding:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;position:relative;min-width:36px;height:36px;border-radius:8px}

/* Custom play/pause icon */
#playBtn::before {
	content: "";
	border-style: solid;
	border-width: 8px 0 8px 14px;
	border-color: transparent transparent transparent #ccc;
	display: inline-block;
	margin-left: 2px;
}

#playBtn.playing::before {
	border-width: 0;
	width: 14px;
	height: 16px;
	background: linear-gradient(to right, #ccc 0%, #ccc 40%, transparent 40%, transparent 60%, #ccc 60%, #ccc 100%);
}
.player .control:hover{background:#444;color:#fff;border-color:#666}
.player .control:active{transform:translateY(2px)}
.progress-wrap{flex:1;display:flex;align-items:center;padding:0 10px;position:relative;height:24px;margin-right:10px}

/* Custom boxy progress bar */
.progress-wrap::before {
	content: "";
	position: absolute;
	left: 10px;
	right: 10px;
	top: 50%;
	transform: translateY(-50%);
	height: 16px;
	background: #222;
	border: 2px solid #555;
	border-radius: 4px;
}

.progress-bar {
	position: absolute;
	left: 10px;
	top: 50%;
	transform: translateY(-50%);
	height: 16px;
	background: #666;
	border: 2px solid #888;
	transition: width 0.1s ease;
	max-width: calc(100% - 20px);
	border-radius: 4px;
}

#progress{display:none}
#time{color:#999;min-width:50px;text-align:right;font-size:1.1rem;font-weight:bold}

#volume{display:none}

.song-meta{font-size:1rem;color:#fff;font-weight:bold;text-transform:uppercase;padding:12px 0;text-align:center}
.song-meta #songTitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.controls-row{display:flex;flex-direction:column;align-items:center;gap:8px}

.play-controls{display:flex;align-items:center;justify-content:flex-start;gap:8px;width:100%}

/* Visualizer hero section */
.visualizer-card{width:100%;background:rgba(42,42,42,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);padding:12px;display:flex;gap:20px;align-items:stretch;box-shadow:0 4px 30px rgba(0,0,0,0.3);min-height:120px;border-radius:12px}
.visualizer{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px;justify-content:center;flex:1}
.visualizer-container{width:100%;height:80px;display:flex;align-items:flex-end;justify-content:center;gap:2px}
.bar{width:6px;background:#666;border:1px solid #888;transition:height 0.1s ease;min-height:3px;border-radius:2px}

/* Toast notifications */
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px}
.toast{background:#2a2a2a;border:2px solid #444;color:#fff;padding:12px 16px;border-radius:8px;box-shadow:0 0 10px rgba(255,255,255,0.1);font-family:"Smallest Pixel-7", monospace;font-size:0.9rem;min-width:200px;animation:slideIn 0.3s ease-out}
.toast.success{border-color:#8fbc8f;box-shadow:0 0 10px rgba(143,188,143,0.3)}
.toast.hidden{animation:fadeOut 0.3s ease-out forwards}

@keyframes slideIn{
	from{transform:translateX(100%);opacity:0}
	to{transform:translateX(0);opacity:1}
}

@keyframes slideOut{
	from{transform:translateX(0);opacity:1}
	to{transform:translateX(100%);opacity:0}
}

/* Click to enter overlay */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.overlay-content{text-align:center}
.enter-text{font-family:"Smallest Pixel-7", monospace;font-size:1.8rem;font-weight:bold;color:#fff;text-transform:uppercase;letter-spacing:3px;margin-bottom:20px}
.enter-subtext{font-family:"Smallest Pixel-7", monospace;font-size:1rem;color:#999;text-transform:uppercase;letter-spacing:2px}
.overlay.hidden{display:none;animation:fadeOut 0.8s ease-out}

@keyframes fadeOut{
  from{opacity:1}
  to{opacity:0}
}

/* Mobile optimizations */
.mobile .toast-container {
  top: 10px !important;
  right: 10px !important;
  left: 10px !important;
}

.mobile .toast {
  font-size: 0.8rem;
  padding: 8px 12px;
  min-width: auto;
}

.mobile .bar {
  width: 4px;
}

.mobile .player .control {
  min-width: 32px;
  height: 32px;
  font-size: 10px;
}

.mobile .progress-wrap {
  height: 20px;
}

.mobile .progress-wrap::before,
.mobile .progress-bar {
  height: 12px;
}

@media (max-width:720px){
  .main-area{flex-direction:column}
  .card{width:100%}
  .hero{align-items:center;text-align:center}
  .player-visualizer-column{width:100%}
  .player{width:100%;height:120px}
  .visualizer-card{margin-top:0}
}

@media (max-width:480px){
  .wrap{padding:25px 8px 15px 8px}
  .avatar{width:80px;height:80px}
  .name{font-size:1.3rem}
  .player{padding:10px}
  .bar{width:4px}
  body{padding-top:env(safe-area-inset-top, 0)}
}
	</style>
</head>
<body>
	<video class="bg-video" autoplay muted loop playsinline>
		<source src="resources/bg.mp4" type="video/mp4">
	</video>
	<div class="overlay" id="overlay">
		<div class="overlay-content">
			<div class="enter-text">Click to Enter</div>
		</div>
	</div>
	<div class="toast-container" id="toastContainer"></div>
	<div class="wrap">
		<div class="main-area">
			<div class="card">
				<main class="hero">
					<img src="resources/avatar.jpg" alt="Avatar" class="avatar">
					<h1 class="name">apollo</h1>
					<p class="tagline" id="tagline"></p>
				</main>
			</div>
			<div class="player-visualizer-column">
				<div class="player-card">
					<div class="player" id="player">
						<div class="song-meta">
							<div id="songTitle">KNICKS IN 2013 - smokedope2016</div>
						</div>
						<div class="controls-row">
							<div class="play-controls">
								<button id="playBtn" aria-label="Play" class="control"></button>
								<div class="progress-wrap">
									<div class="progress-bar" id="progressBar"></div>
									<input type="range" id="progress" min="0" max="100" value="0">
								</div>
							</div>
						</div>

						<audio id="audio" src="resources/KNICKS%20IN%202013%20-%20smokedope2016.mp3" preload="metadata"></audio>
					</div>
				</div>
				<div class="discord-card">
					<div class="discord-content">
						<div class="discord-status">
							<img id="discordAvatar" src="" alt="Discord Avatar" class="discord-avatar">
							<div class="status-info">
								<div id="discordName" class="discord-name">Loading...</div>
								<div id="discordStatus" class="discord-status-text">Checking status...</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="spotify-card">
			<div class="spotify-content">
				<div class="spotify-status" id="spotifyStatus">
					<img id="spotifyAlbumArt" src="" alt="Album Art" class="spotify-album-art">
					<div class="spotify-info">
						<div id="spotifySong" class="spotify-song">No song playing</div>
						<div id="spotifyArtist" class="spotify-artist"></div>
						<div class="spotify-progress">
							<div class="spotify-progress-bar" id="spotifyProgressBar"></div>
							<div class="spotify-time">
								<span id="spotifyCurrentTime">0:00</span>
								<span id="spotifyTotalTime">0:00</span>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
document.addEventListener('DOMContentLoaded',()=>{
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const progress = document.getElementById('progress');
  const progressBar = document.getElementById('progressBar');
  const progressWrap = document.querySelector('.progress-wrap');
  const time = document.getElementById('time');
  const songTitle = document.getElementById('songTitle');
  const overlay = document.getElementById('overlay');
  const toastContainer = document.getElementById('toastContainer');

  // Mobile detection
  function isMobile() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
           window.innerWidth <= 768;
  }

  // Mobile optimizations
  if (isMobile()) {
    // Add mobile class to body for CSS targeting
    document.body.classList.add('mobile');
    
    // Adjust toast positioning for mobile
    if (toastContainer) {
      toastContainer.style.top = '10px';
      toastContainer.style.right = '10px';
    }

  }

  // Toast notification function
  function showToast(message, type = 'success') {
    // Remove any existing toasts instantly
    toastContainer.innerHTML = '';
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    toastContainer.appendChild(toast);
    
    // Auto remove after 3 seconds
    setTimeout(() => {
      toast.classList.add('hidden');
      setTimeout(() => {
        if (toast.parentNode) {
          toast.remove();
        }
      }, 300);
    }, 3000);
  }

  // Discord status functionality
  const discordUserId = '284372724900691979';
  const discordAvatar = document.getElementById('discordAvatar');
  const discordName = document.getElementById('discordName');
  const discordStatus = document.getElementById('discordStatus');
  const discordStatusContainer = document.querySelector('.discord-status');

  function updateDiscordUI(data) {
    try {
      if (data) {
        // Update avatar with cache busting prevention
        if (data.discord_user.avatar) {
          const avatarUrl = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png?size=64`;
          discordAvatar.src = avatarUrl;
        } else {
          discordAvatar.src = `https://cdn.discordapp.com/embed/avatars/${parseInt(data.discord_user.discriminator) % 5}.png`;
        }
        
        // Update name
        const displayName = data.discord_user.global_name || data.discord_user.username;
        discordName.textContent = displayName;
        
        // Update status
        const statusMap = {
          online: 'Online',
          idle: 'Idle', 
          dnd: 'Do Not Disturb',
          offline: 'Offline'
        };
        
        const statusText = statusMap[data.discord_status] || 'Unknown';
        discordStatus.textContent = statusText;
        
        // Update status class for styling
        discordStatusContainer.className = `discord-status ${data.discord_status}`;
        
        // Add activity if present
        if (data.activities && data.activities.length > 0) {
          const activity = data.activities[0];
          if (activity.name && activity.name !== 'Custom Status') {
            discordStatus.textContent = `${statusText} - ${activity.name}`;
          }
        }
        
        // Update Spotify status
        updateSpotifyStatus(data);
      }
    } catch (error) {
      console.error('Error updating Discord UI:', error);
    }
  }

  // Spotify status functionality
  const spotifyAlbumArt = document.getElementById('spotifyAlbumArt');
  const spotifySong = document.getElementById('spotifySong');
  const spotifyArtist = document.getElementById('spotifyArtist');
  const spotifyStatusContainer = document.getElementById('spotifyStatus');
  const spotifyProgressBar = document.getElementById('spotifyProgressBar');
  const spotifyCurrentTime = document.getElementById('spotifyCurrentTime');
  const spotifyTotalTime = document.getElementById('spotifyTotalTime');
  const spotifyCard = document.querySelector('.spotify-card');

  let spotifyProgressInterval;

  function formatSpotifyTime(ms) {
    if (!ms || !isFinite(ms)) return '0:00';
    const seconds = Math.floor(ms / 1000);
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
  }

  function updateSpotifyProgress(data) {
    try {
      const spotifyActivity = data.activities?.find(activity => activity.type === 2 && activity.name === 'Spotify');
      
      if (spotifyActivity && spotifyActivity.timestamps) {
        const { start, end } = spotifyActivity.timestamps;
        
        if (start && end) {
          const now = Date.now();
          const totalDuration = end - start;
          const currentProgress = now - start;
          
          // Calculate progress percentage
          const progressPercent = Math.max(0, Math.min(100, (currentProgress / totalDuration) * 100));
          
          // Update progress bar
          spotifyProgressBar.style.setProperty('--progress', progressPercent + '%');
          
          // Update time displays
          spotifyCurrentTime.textContent = formatSpotifyTime(currentProgress);
          spotifyTotalTime.textContent = formatSpotifyTime(totalDuration);
          
          // Clear existing interval before starting new one
          if (spotifyProgressInterval) {
            clearInterval(spotifyProgressInterval);
            spotifyProgressInterval = null;
          }
          
          // Start real-time updates
          spotifyProgressInterval = setInterval(() => {
            const now = Date.now();
            const currentProgress = now - start;
            
            if (currentProgress >= totalDuration) {
              // Song ended, clear interval
              clearInterval(spotifyProgressInterval);
              spotifyProgressInterval = null;
              spotifyProgressBar.style.setProperty('--progress', '0%');
              spotifyCurrentTime.textContent = '0:00';
            } else {
              const progressPercent = Math.max(0, Math.min(100, (currentProgress / totalDuration) * 100));
              spotifyProgressBar.style.setProperty('--progress', progressPercent + '%');
              spotifyCurrentTime.textContent = formatSpotifyTime(currentProgress);
            }
          }, 1000); // Update every second
        }
      } else {
        // No Spotify activity or no timestamps
        clearInterval(spotifyProgressInterval);
        spotifyProgressInterval = null;
        spotifyProgressBar.style.setProperty('--progress', '0%');
        spotifyCurrentTime.textContent = '0:00';
        spotifyTotalTime.textContent = '0:00';
      }
    } catch (error) {
      console.error('Error updating Spotify progress:', error);
      clearInterval(spotifyProgressInterval);
      spotifyProgressInterval = null;
    }
  }

  function updateSpotifyStatus(data) {
    try {
      console.log('Discord data:', data);
      console.log('Activities:', data.activities);
      const spotifyActivity = data.activities?.find(activity => activity.type === 2 && activity.name === 'Spotify');
      console.log('Spotify activity found:', spotifyActivity);
      
      if (spotifyActivity) {
        // Show the Spotify card immediately
        spotifyCard.classList.remove('hidden');
        
        // Update album art (use placeholder if no assets)
        if (spotifyActivity.assets?.large_image) {
          const albumArtUrl = spotifyActivity.assets.large_image.startsWith('spotify:') 
            ? `https://i.scdn.co/image/${spotifyActivity.assets.large_image.replace('spotify:', '')}`
            : spotifyActivity.assets.large_image;
          spotifyAlbumArt.src = albumArtUrl;
        } else {
          spotifyAlbumArt.src = 'https://i.scdn.co/image/ab67616d0000b2735a9a6c4b9a0c4e5a6d7e8f9a'; // Default Spotify placeholder
        }
        
        // Update song and artist
        spotifySong.textContent = spotifyActivity.details || 'Unknown Song';
        spotifyArtist.textContent = spotifyActivity.state || 'Unknown Artist';
        
        // Add playing class for green color
        spotifyStatusContainer.className = 'spotify-status playing';
        
        // Update progress
        updateSpotifyProgress(data);
      } else {
        // Hide the Spotify card with fade-out animation
        spotifyCard.classList.add('hidden');
        
        // Clear progress after animation completes
        setTimeout(() => {
          if (spotifyCard.classList.contains('hidden')) {
            clearInterval(spotifyProgressInterval);
            spotifyProgressInterval = null;
            spotifyProgressBar.style.setProperty('--progress', '0%');
            spotifyCurrentTime.textContent = '0:00';
            spotifyTotalTime.textContent = '0:00';
          }
        }, 300); // Match the CSS transition duration
      }
    } catch (error) {
      console.error('Error updating Spotify status:', error);
      // Hide card on error with fade-out
      spotifyCard.classList.add('hidden');
      
      // Clear progress after animation
      setTimeout(() => {
        if (spotifyCard.classList.contains('hidden')) {
          clearInterval(spotifyProgressInterval);
          spotifyProgressInterval = null;
          spotifyProgressBar.style.setProperty('--progress', '0%');
          spotifyCurrentTime.textContent = '0:00';
          spotifyTotalTime.textContent = '0:00';
        }
      }, 300);
    }
  }

  // Fast HTTP API with timeout
  async function tryHTTPAPI() {
    try {
      // Set a timeout of 5 seconds
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);
      
      const response = await fetch(`https://api.lanyard.rest/v1/users/${discordUserId}`, {
        signal: controller.signal,
        headers: {
          'Accept': 'application/json',
          'Cache-Control': 'no-cache'
        }
      });
      
      clearTimeout(timeoutId);
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      
      const result = await response.json();
      
      if (result.success && result.data) {
        updateDiscordUI(result.data);
      } else {
        throw new Error('Invalid response');
      }
    } catch (error) {
      console.error('HTTP API failed:', error);
      // Set default values immediately on error
      discordName.textContent = 'Status unavailable';
      discordStatus.textContent = 'Connection failed';
      discordStatusContainer.className = 'discord-status offline';
      discordAvatar.src = 'https://cdn.discordapp.com/embed/avatars/0.png';
    }
  }

  // Initialize with timeout and fallback
  function initDiscordStatus() {
    // Show loading state briefly
    discordName.textContent = 'Loading...';
    discordStatus.textContent = 'Connecting...';
    
    // Try HTTP API first (faster than WebSocket for initial load)
    tryHTTPAPI();
    
    // Try WebSocket for real-time updates
    setTimeout(initWebSocket, 1000);
  }

  // WebSocket for real-time updates
  function initWebSocket() {
    try {
      const ws = new WebSocket(`wss://api.lanyard.rest/socket`);
      
      ws.onopen = () => {
        console.log('Lanyard WebSocket connected for real-time updates');
        ws.send(JSON.stringify({
          op: 2,
          d: {
            subscribe_to_id: discordUserId
          }
        }));
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.t === 'PRESENCE_UPDATE') {
          updateDiscordUI(data.d);
        }
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
      
      ws.onclose = () => {
        console.log('WebSocket closed, retrying in 10s...');
        setTimeout(initWebSocket, 10000);
      };
      
    } catch (error) {
      console.error('WebSocket failed:', error);
    }
  }

  // Initialize immediately
  initDiscordStatus();
  
  // Update every 10 seconds as fallback (reduced from 60 for faster updates)
  setInterval(tryHTTPAPI, 10000);

  // song player
  const song = { src: 'resources/song.mp3', name: 'hopeless - morgue' };

  function loadSong() {
    audio.src = song.src;
    songTitle.textContent = song.name;
    audio.load();
  }

  function nextSong() {
    // Restart the same song
    loadSong();
    audio.play();
    playBtn.classList.add('playing');
  }

  function formatTime(s){
    if(!isFinite(s)) return '0:00';
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60).toString().padStart(2,'0');
    return m+':'+sec;
  }

  function extractNameFromSrc(src){
    try{
      const p = src.split('/').pop().split('?')[0];
      return decodeURIComponent(p).replace(/\.[^/.]+$/,'');
    }catch(e){return 'Unknown Song'}
  }
  if(songTitle) songTitle.textContent = extractNameFromSrc(audio.src || '');

  // Audio ended event - restart same song
  audio.addEventListener('ended', () => {
    // Restart the same song
    audio.currentTime = 0;
    audio.play();
    playBtn.classList.add('playing');
  });

  // Initialize with single song
  loadSong();
  
  // Set volume to 20% and lock it
  audio.volume = 0.1;
  
  // Prevent volume changes
  audio.addEventListener('volumechange', () => {
    if (audio.volume !== 0.1) {
      audio.volume = 0.1;
    }
  });
  
  // Override any volume control attempts
  const originalVolumeSet = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'volume');
  if (originalVolumeSet && originalVolumeSet.set) {
    Object.defineProperty(audio, 'volume', {
      get: originalVolumeSet.get,
      set: function(value) {
        originalVolumeSet.set.call(this, 0.1);
      }
    });
  }

  // Overlay click handler
  overlay.addEventListener('click',()=>{
    // Start fade animation
    overlay.style.animation = 'fadeOut 0.8s ease-out forwards';
    
    // Start music immediately
    audio.play();
    playBtn.classList.add('playing');
    
    // Remove overlay after animation completes
    setTimeout(() => {
      overlay.classList.add('hidden');
      overlay.style.animation = ''; // Reset animation
    }, 800);
  });

  playBtn.addEventListener('click',()=>{
    if(audio.paused){
      audio.play();
      playBtn.classList.add('playing');
    } else {
      audio.pause();
      playBtn.classList.remove('playing');
    }
  });

  audio.addEventListener('loadedmetadata',()=>{
    progress.value = 0;
    progressBar.style.width = '0%';
  });

  audio.addEventListener('timeupdate',()=>{
    if(audio.duration){
      const progressPercent = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = progressPercent + '%';
      progress.value = progressPercent;
    }
  });

  // Click to seek on progress bar
  progressWrap.addEventListener('click',(e)=>{
    if(isFinite(audio.duration)){
      const rect = progressWrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const width = rect.width;
      const pct = Math.max(0, Math.min(100, (x / width) * 100));
      progress.value = pct;
      progressBar.style.width = pct + '%';
      audio.currentTime = (pct / 100) * audio.duration;
    }
  });

  // Seek when user interacts with range (fallback)
  let seeking = false;
  progress.addEventListener('input',(e)=>{
    seeking = true;
    const pct = Number(e.target.value)/100;
    if(isFinite(audio.duration)){
      time.textContent = formatTime(pct*audio.duration);
      progressBar.style.width = (pct * 100) + '%';
    }
  });
  progress.addEventListener('change',(e)=>{
    const pct = Number(e.target.value)/100;
    if(isFinite(audio.duration)) audio.currentTime = pct*audio.duration;
    seeking = false;
  });

  // space toggles play/pause when focused on body (only after overlay is hidden)
  document.body.addEventListener('keydown',(e)=>{
    if(e.code==='Space' && document.activeElement.tagName!=='INPUT' && overlay.classList.contains('hidden')){
      e.preventDefault();
      playBtn.click();
    }
  });
});
	</script>
</body>
</html>
